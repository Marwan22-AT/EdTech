<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ed Tech - تسجيل الدخول</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <h1>Ed Tech</h1>
                <p>منصة التعلم الرقمي المهني</p>
            </div>
            
            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
                <button class="tab-btn" onclick="switchTab('register')">إنشاء حساب</button>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginEmail">البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" required placeholder="example@email.com">
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">كلمة المرور</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                
                <div class="form-options">
                    <label class="remember">
                        <input type="checkbox"> تذكرني
                    </label>
                    <a href="#" class="forgot">نسيت كلمة المرور؟</a>
                </div>
                
                <button type="submit" class="btn-primary">
                    <i class="fas fa-sign-in-alt"></i>
                    تسجيل الدخول
                </button>
            </form>
            
            <!-- Register Form -->
            <form id="registerForm" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label for="regName">الاسم الكامل</label>
                    <input type="text" id="regName" required placeholder="محمد أحمد">
                </div>
                
                <div class="form-group">
                    <label for="regEmail">البريد الإلكتروني</label>
                    <input type="email" id="regEmail" required placeholder="example@email.com">
                </div>
                
                <div class="form-group">
                    <label for="regPassword">كلمة المرور</label>
                    <input type="password" id="regPassword" required placeholder="••••••••" minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="regConfirm">تأكيد كلمة المرور</label>
                    <input type="password" id="regConfirm" required placeholder="••••••••">
                </div>
                
                <div class="form-options">
                    <label class="remember">
                        <input type="checkbox" id="agreeTerms" required> أوافق على <a href="#">الشروط والأحكام</a>
                    </label>
                </div>
                
                <button type="submit" class="btn-primary">
                    <i class="fas fa-user-plus"></i>
                    إنشاء حساب
                </button>
            </form>
            
            <div class="divider">
                <span>أو</span>
            </div>
            
            <!-- Social Login -->
            <div class="social-login">
                <button type="button" class="btn-social google" onclick="loginWithGoogle()">
                    <i class="fab fa-google"></i>
                    Google
                </button>
                <button type="button" class="btn-social facebook" onclick="loginWithFacebook()">
                    <i class="fab fa-facebook-f"></i>
                    Facebook
                </button>
            </div>
            
            <!-- Guest Access -->
            <div class="guest-access">
                <p>لا تريد التسجيل الآن؟</p>
                <button type="button" class="btn-guest" onclick="enterAsGuest()">
                    <i class="fas fa-user-clock"></i>
                    الدخول كضيف
                </button>
            </div>
            
            <div class="auth-footer">
                <div class="lang-switch">
                    <button onclick="toggleLang()" class="lang-btn">
                        <i class="fas fa-globe"></i>
                        <span id="langText">English</span>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="auth-visual">
            <div class="visual-content">
                <h2>ابدأ رحلة التعلم</h2>
                <p>اكتشف عالمًا من الفرص من خلال دوراتنا الاحترافية في التسويق الرقمي، تطوير الألعاب، والتصميم</p>
                <div class="stats">
                    <div class="stat">
                        <span class="number">50+</span>
                        <span class="label">كورس احترافي</span>
                    </div>
                    <div class="stat">
                        <span class="number">10K+</span>
                        <span class="label">متعلم</span>
                    </div>
                    <div class="stat">
                        <span class="number">95%</span>
                        <span class="label">نسبة الرضا</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
